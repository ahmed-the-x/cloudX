<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CloudX</title>
       <style>
        :root {
            --black: #000;
            --white: #fff;
            --gray: #1a1a1a;
            --danger: #ff0000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--black);
            color: var(--white);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .auth-container {
            max-width: 450px;
            margin: 5rem auto;
            padding: 2.5rem;
            text-align: center;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin: 3rem 0;
        }

        .input-field {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--white);
            color: var(--white);
            padding: 14px 0 10px 0;
            width: 100%;
            font-size: 1.1rem;
            height: 44px;
            box-sizing: border-box;
        }

        .input-field::placeholder {
            color: var(--white);
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            font-size: 0.9rem;
        }

        .input-field:focus {
            outline: none;
            border-bottom-color: var(--white);
        }


        .btn {
            background: transparent;
            color: var(--white);
            border: 1px solid var(--white);
            padding: 0 25px;
            font-size: 0.8rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: max-content;
            height: 44px;
            box-sizing: border-box;
            line-height: 1;
            position: relative;
        }

        .btn:hover {
            background: var(--white);
            color: var(--black);
        }

        .auth-link {
            font-size: 1rem;
            margin-top: 2rem;
        }

        .auth-link a {
            color: var(--white);
            text-decoration: underline;
        }
        
        .form-description {
            font-size: 1rem;
            color: #8a8a8a;
            margin-bottom: 1.5rem;
        }

        .flash-message {
            background: var(--gray);
            color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 1.2rem;
            margin-bottom: 2rem;
            text-align: center;
            font-size: 0.95rem;
            letter-spacing: 0.05rem;
        }

        .logo-img {
            max-width: 180px;
            width: 100%;
            height: auto;
            display: block;
            margin: -40px auto 70px auto; 
        }

        .password-field-container {
            position: relative;
        }
        .password-toggle {
            position: absolute;
            right: 0;
            top: 60%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s ease;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            opacity: 1;
        }

        .password-toggle svg {
            width: 18px;
            height: 18px;
            stroke: var(--white);
            fill: none;
            stroke-width: 2;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <img src="{{ url_for('static', filename='icons/logo.png') }}" alt="CloudX Logo" class="logo-img">        
        
        <p class="form-description">Please enter and confirm your new password.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form action="{{ url_for('reset_with_token', token=token) }}" method="post" class="auth-form">
              <div class="password-field-container">
                    <input type="password" id="password" name="password" class="input-field" placeholder="PASSWORD" required>
                    <div class="password-toggle" onclick="togglePassword()">
                        <svg id="eye-icon" viewBox="0 0 24 24">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </div>
                </div>
            <input type="password" name="confirm_password" class="input-field" placeholder="CONFIRM PASSWORD" required>
            <button type="submit" class="btn">Set New Password</button>
        </form>

    </div>
<script>

        // Password toggle functionality
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordField.type === 'password') {
                // Show password - open eye
                passwordField.type = 'text';
                eyeIcon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                `;
            } else {
                // Hide password - crossed eye
                passwordField.type = 'password';
                eyeIcon.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                `;
            }
        }
</script>
</body>
</html>
