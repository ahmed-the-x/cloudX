<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact - CloudX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='website.css') }}" />
<style>
      .hero-section {
      padding-top: 8rem;
      padding-bottom: 4rem;
      max-width: 1400px;
      margin: 0 auto;
      padding-left: 2rem;
      padding-right: 2rem;
    }

    .hero-content {
      text-align: center;
      margin-bottom: 5rem;
    }

    .hero-title {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      line-height: 1.1;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: rgba(255, 255, 255, 0.5);
      font-weight: 300;
      line-height: 1.6;
      max-width: 600px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <header>
      <div class="header-content">
<a href="/" class="logo">
  <img src="{{ url_for('static', filename='icons/logo.png') }}" alt="CloudX Logo">
</a>        <div class="hamburger-menu" id="hamburger-toggle">
          <div class="hamburger-icon" id="hamburger-icon">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </header>

    <div class="mobile-menu" id="mobile-menu">
      <div class="mobile-menu-header">
      </div>
      <div class="mobile-menu-items">
<a href="/about" class="mobile-menu-item">About</a>
<a href="/pricing" class="mobile-menu-item">Pricing</a>
<a href="/why-us" class="mobile-menu-item">Why Us?</a>
        <a href="/contact" class="mobile-menu-item">Contact</a>
<a href="https://app.cloudxhq.com/login" class="mobile-menu-item">Login</a>      


      </div>
    </div>
    <div class="mobile-menu-overlay" id="mobile-menu-overlay"></div>

    <section class="hero-section">
      <div class="hero-content">
        <h1 class="hero-title">Contact Us</h1>
        <p class="hero-subtitle">Get in touch with our team.</p>
        <p class="hero-subtitle">We respond to inquiries under 24 hours.</p>
      </div>

      <div class="contact-container">
        <div class="contact-form-wrapper">
          <form class="contact-form" id="contact-form" method="POST">
            <div class="form-group">
              <label for="name" class="form-label">Name</label>
              <input type="text" id="name" name="name" class="form-input" required>
            </div>

            <div class="form-group">
              <label for="email" class="form-label">Email</label>
              <input type="email" id="email" name="email" class="form-input" required>
            </div>

            <div class="form-group">
              <label for="subject" class="form-label">Subject</label>
              <select id="subject" name="subject" class="form-select" required>
                <option value="">Select a topic</option>
                <option value="general">General Inquiry</option>
                <option value="support">Technical Support</option>
                <option value="billing">Billing Question</option>
                <option value="partnership">Partnership</option>
                <option value="feedback">Feedback</option>
              </select>
            </div>

            <div class="form-group">
              <label for="message" class="form-label">Message</label>
              <textarea id="message" name="message" class="form-textarea" rows="6" placeholder="Tell us how we can help..." required></textarea>
            </div>

            <button type="submit" class="btn form-submit">Send Message</button>
          </form>
        </div>
      </div>


    </section>

    <footer class="footer">
      <div class="footer-content">
        <p><span class="nav-linky"> CloudX &copy; 2025 </span> | <a href="/privacy" class="nav-link"> Privacy Policy </a> | <a href="/terms" class="nav-link">Terms of Service</a></p>
      </div>
    </footer>
  </div>

  <script>
    // Mobile Menu Functionality
    const toggle = document.getElementById("hamburger-toggle");
    const icon = document.getElementById("hamburger-icon");
    const menu = document.getElementById("mobile-menu");
    const overlay = document.getElementById("mobile-menu-overlay");
    const body = document.body;

    function closeMenu() {
      icon.classList.remove("active");
      menu.classList.remove("active");
      overlay.classList.remove("active");
      body.classList.remove("menu-active");
      document.body.style.overflow = '';
    }

    function openMenu() {
      icon.classList.add("active");
      menu.classList.add("active");
      overlay.classList.add("active");
      body.classList.add("menu-active");
      document.body.style.overflow = 'hidden';
    }

    toggle.addEventListener('click', () => menu.classList.contains('active') ? closeMenu() : openMenu());
    overlay.addEventListener('click', closeMenu);
    document.querySelectorAll('.mobile-menu-item, .nav-link').forEach(link => link.addEventListener('click', closeMenu));

    // Contact Form Handling
    const contactForm = document.getElementById('contact-form');
    const submitButton = contactForm.querySelector('.form-submit');

    contactForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const originalText = submitButton.textContent;
      submitButton.textContent = 'Sending...';
      submitButton.disabled = true;
      submitButton.style.opacity = '0.7';

      const formData = new FormData(contactForm);
      const data = Object.fromEntries(formData.entries());

      fetch('/contact', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(data),
      })
      .then(response => response.json())
      .then(result => {
        if (result.success) {
          submitButton.textContent = 'Message Sent!';
          submitButton.style.backgroundColor = '#ffffff';
          submitButton.style.color = '#000000';
          contactForm.reset();
        } else {
          submitButton.textContent = 'Error!';
          submitButton.style.backgroundColor = '#d9534f'; // Error color
          submitButton.style.color = '#ffffff';
          console.error('Form submission error:', result.message);
        }
      })
      .catch(error => {
        console.error('Fetch error:', error);
        submitButton.textContent = 'Error!';
        submitButton.style.backgroundColor = '#d9534f';
        submitButton.style.color = '#ffffff';
      })
      .finally(() => {
        // Reset button after a delay
        setTimeout(() => {
          submitButton.textContent = originalText;
          submitButton.disabled = false;
          submitButton.style.opacity = '1';
          submitButton.style.backgroundColor = '';
          submitButton.style.color = '';
          submitButton.style.border = '';
        }, 3000);
      });
    });

    // Smooth Scrolling for Anchor Links
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function(e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });

    // Scroll Effects
    window.addEventListener('scroll', () => {
      const header = document.querySelector('header');
      header.classList.toggle('scrolled', window.scrollY > 50);
    }, { passive: true });
  </script>
</body>
</html>
